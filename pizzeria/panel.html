<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Cocina - Pizzería</title>
    <style>
        body { font-family: monospace; background: #222; color: #fff; padding: 20px; text-align: center; }
        #contenedorPedidos { max-width: 500px; margin: 0 auto; color: #333; }
        .pedido-alerta { background: #e74c3c; padding: 20px; border-radius: 5px; margin-top: 20px; color: #fff; animation: parpadeo 1s infinite; border: 2px solid #fff; }
        button { padding: 15px 30px; font-size: 18px; background: #2ecc71; border: none; color: white; cursor: pointer; font-weight: bold; margin-top: 15px; border-radius: 20px; width: 100%; }
        @keyframes parpadeo { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>👨‍🍳 Pedidos Entrantes de la Pizzería</h1>
    <p style="color: #bbb;">Recibidor Blindado por Hashtag para Safari Local.</p>
    
    <div id="contenedorPedidos">
        <p style="color: #fff;">Esperando nuevos pedidos...</p>
    </div>

<script>
    let intervaloTimbre = null;

    // Generador de ondas sonoras nativas inmune a las restricciones de Apple
    function sonarTimbreSafari() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscilador = audioCtx.createOscillator();
            const ganancia = audioCtx.createGain();
            oscilador.type = 'square'; // Sonido fuerte tipo timbre real
            oscilador.frequency.setValueAtTime(880, audioCtx.currentTime);
            ganancia.gain.setValueAtTime(0.4, audioCtx.currentTime);
            ganancia.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscilador.connect(ganancia);
            ganancia.connect(audioCtx.destination);
            oscilador.start();
            oscilador.stop(audioCtx.currentTime + 0.3);
        } catch(e) {
            console.log("Esperando interacción...");
        }
    }

    // 🔍 DECODIFICADOR MÁGICO: Lee la barra de direcciones saltándose el bloqueo de Safari
    function comprobarHashEntrante() {
        // Atrapa todo el texto que viene después del '#'
        const datosHash = window.location.hash.substring(1);

        if (datosHash) {
            // Separa las tres partes (Cliente, Dirección, Detalle) usando el separador '|'
            const partes = datosHash.split('|');
            
            if (partes.length === 3) {
                const cliente = decodeURIComponent(partes[0]);
                const direccion = decodeURIComponent(partes[1]);
                const platos = decodeURIComponent(partes[2]);

                // Dibuja la comanda roja parpadeante en pantalla inmediatamente
                const contenedor = document.getElementById('contenedorPedidos');
                contenedor.innerHTML = `
                    <div class="pedido-alerta">
                        <h2>🚨 ¡NUEVO PEDIDO ENTRACCIÓN! 🚨</h2>
                        <p style="text-align: left;"><strong>Cliente:</strong> ${cliente}</p>
                        <p style="text-align: left;"><strong>Dirección:</strong> ${direccion}</p>
                        <p style="text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius:4px;"><strong>Detalle:</strong><br>${platos}</p>
                        <button onclick="aceptarEImprimir()">✅ IMPRIMIR Y APAGAR TIMBRE</button>
                    </div>
                `;

                // Activa la secuencia repetitiva del timbre electrónico
                if (!intervaloTimbre) {
                    intervaloTimbre = setInterval(sonarTimbreSafari, 600);
                }
            }
        }
    }

    function aceptarEImprimir() {
        // Apaga la alarma sonora
        clearInterval(intervaloTimbre);
        intervaloTimbre = null;
        
        // Abre la ventana de impresión nativa de tu Mac
        window.print();
        
        // Limpia el hashtag de la URL para vaciar el recibidor
        window.location.hash = "";
        document.getElementById('contenedorPedidos').innerHTML = "<p style='color: #fff;'>Esperando nuevos pedidos...</p>";
        
        // Regresa automáticamente a la pantalla de las pizzas
        window.location.href = "pizzák.html";
    }

    // Escanea la URL apenas carga el archivo
    window.addEventListener('DOMContentLoaded', comprobarHashEntrante);
</script>
</body>
</html>
